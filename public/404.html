<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - LunarAIstorm</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #1a4a6b 0%, #336699 40%, #2a5580 100%);
        font-family: Verdana, sans-serif;
        color: #fff;
      }
      .card {
        width: min(520px, calc(100% - 32px));
        background: #e5e8ef;
        border: 1px solid #8fa1bd;
        color: #1c2a42;
        padding: 16px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 20px;
      }
      p {
        margin: 6px 0;
        font-size: 14px;
      }
      a {
        display: inline-block;
        margin-top: 12px;
        background: linear-gradient(180deg, #f0a64f 0%, #d26f1f 100%);
        border: 1px solid #8c4514;
        color: #fff;
        font-weight: bold;
        text-decoration: none;
        padding: 6px 10px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>404 - Sidan hittades inte</h1>
      <p>Oj här gick det fel.</p>
      <p>Kom och hjälp oss att bygga OpenSverige.</p>
      <a href="https://opensverige.se" target="_blank" rel="noreferrer">Gå till OpenSverige.se</a>
    </div>
  </body>
</html>
